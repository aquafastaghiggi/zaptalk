version: "3.8"

services:
  evolution_api:
    image: atendai/evolution-api:v1.8.7
    container_name: zaptalk_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: zaptalk_secret_key_change_me
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: zaptalk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  evolution_instances:
  evolution_store: